# chips — game suite.
# Deploy: Dokploy builds this compose and routes chips.cpuchip.net -> games:8080
#         via Traefik over the internal network (no host port published — the
#         Dokploy VPS runs several apps that all listen on 8080 in-container).
# Local dev: use `npm run dev` (+ `npm run dev:server`), not this compose.

services:
  games:
    build: .
    container_name: chips
    restart: unless-stopped
    environment:
      - PORT=8080
      - STATE_DIR=/data
    volumes:
      # persists table state across redeploys/restarts
      - chips-state:/data
    expose:
      - "8080"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  chips-state:
